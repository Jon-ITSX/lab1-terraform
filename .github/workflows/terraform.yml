name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_VAR_project_id: ${{ vars.GCP_PROJECT_ID }}
  TF_VAR_student_id: ${{ vars.STUDENT_ID }}
  TF_VAR_region: ${{ vars.GCP_REGION }}

jobs:
  lint:
    name: Lint (fmt)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Generate Trivy IaC report
        run: trivy config --severity CRITICAL,HIGH,MEDIUM,LOW --format table --output trivy-report.txt .
      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}
          path: ./trivy-report.txt
      - name: Enforce CRITICAL gate
        run: trivy config --severity CRITICAL --exit-code 1 .

  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [lint, security, validate]
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Set region fallback
        run: |
          if [ -z "$TF_VAR_region" ]; then
            echo "TF_VAR_region=europe-north1" >> "$GITHUB_ENV"
          fi
      - name: Verify required CI variables
        run: |
          test -n "$TF_VAR_project_id" || (echo "Missing repository variable: GCP_PROJECT_ID" && exit 1)
          test -n "$TF_VAR_student_id" || (echo "Missing repository variable: STUDENT_ID" && exit 1)
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform plan
        run: terraform plan -out=tfplan
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Set region fallback
        run: |
          if [ -z "$TF_VAR_region" ]; then
            echo "TF_VAR_region=europe-north1" >> "$GITHUB_ENV"
          fi
      - name: Verify required CI variables
        run: |
          test -n "$TF_VAR_project_id" || (echo "Missing repository variable: GCP_PROJECT_ID" && exit 1)
          test -n "$TF_VAR_student_id" || (echo "Missing repository variable: STUDENT_ID" && exit 1)
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform apply
        run: terraform apply -auto-approve
