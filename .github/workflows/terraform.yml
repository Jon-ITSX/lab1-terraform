name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_student_id: ${{ secrets.STUDENT_ID }}
  TF_VAR_region: ${{ secrets.GCP_REGION }}
  TF_VAR_zone: ${{ secrets.GCP_ZONE }}
  TF_VAR_machine_type: ${{ secrets.GCP_MACHINE_TYPE }}
  TF_VAR_gcp_sa_key_json: ${{ secrets.GCP_SA_KEY }}

jobs:
  lint:
    name: Lint (fmt)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive

  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Generate Trivy IaC report
        run: trivy config --severity CRITICAL,HIGH,MEDIUM,LOW --format table --output trivy-report.txt .
      - name: Upload Trivy report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}
          path: ./trivy-report.txt
      - name: Enforce CRITICAL gate
        run: trivy config --severity CRITICAL --exit-code 1 .

  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [lint, security, validate]
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Set region/zone/machine fallback
        run: |
          if [ -z "$TF_VAR_region" ]; then
            echo "TF_VAR_region=europe-north1" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_zone" ]; then
            echo "TF_VAR_zone=${TF_VAR_region}-b" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_machine_type" ]; then
            echo "TF_VAR_machine_type=e2-micro" >> "$GITHUB_ENV"
          fi
      - name: Verify required CI secrets
        run: |
          test -n "$TF_VAR_project_id" || (echo "Missing repository secret: GCP_PROJECT_ID" && exit 1)
          test -n "$TF_VAR_student_id" || (echo "Missing repository secret: STUDENT_ID" && exit 1)
          test -n "$TF_VAR_gcp_sa_key_json" || (echo "Missing repository secret: GCP_SA_KEY" && exit 1)
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform plan
        run: terraform plan -out=tfplan
      - name: Upload plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan

  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Set region/zone/machine fallback
        run: |
          if [ -z "$TF_VAR_region" ]; then
            echo "TF_VAR_region=europe-north1" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_zone" ]; then
            echo "TF_VAR_zone=${TF_VAR_region}-b" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_machine_type" ]; then
            echo "TF_VAR_machine_type=e2-micro" >> "$GITHUB_ENV"
          fi
      - name: Verify required CI secrets
        run: |
          test -n "$TF_VAR_project_id" || (echo "Missing repository secret: GCP_PROJECT_ID" && exit 1)
          test -n "$TF_VAR_student_id" || (echo "Missing repository secret: STUDENT_ID" && exit 1)
          test -n "$TF_VAR_gcp_sa_key_json" || (echo "Missing repository secret: GCP_SA_KEY" && exit 1)
      - name: Terraform init
        run: terraform init -backend=false
      - name: Terraform apply with zone fallback
        shell: bash
        run: |
          set -euo pipefail

          base_zone="${TF_VAR_zone:-${TF_VAR_region}-b}"
          zones=("$base_zone" "${TF_VAR_region}-a" "${TF_VAR_region}-b" "${TF_VAR_region}-c")

          declare -A seen
          ordered=()
          for z in "${zones[@]}"; do
            if [ -n "$z" ] && [ -z "${seen[$z]+x}" ]; then
              ordered+=("$z")
              seen[$z]=1
            fi
          done

          for z in "${ordered[@]}"; do
            echo "Trying apply in zone: $z"
            export TF_VAR_zone="$z"

            # CI uses local state (-backend=false). If VM already exists in GCP, skip duplicate create.
            if gcloud compute instances describe "${TF_VAR_student_id}-lab1-vm" --zone "$z" --project "$TF_VAR_project_id" >/dev/null 2>&1; then
              echo "VM already exists in zone $z. Skipping apply (no remote state configured in CI)."
              exit 0
            fi

            set +e
            terraform apply -auto-approve 2>&1 | tee apply.log
            rc=${PIPESTATUS[0]}
            set -e

            if [ "$rc" -eq 0 ]; then
              echo "Apply succeeded in zone: $z"
              exit 0
            fi

            if grep -qi "does not have enough resources available" apply.log; then
              echo "Capacity issue in zone $z. Trying next zone..."
              continue
            fi

            if grep -qi "already exists" apply.log; then
              echo "Resource already exists in zone $z without matching state. Skipping apply."
              exit 0
            fi

            echo "Apply failed for a non-capacity reason in zone $z. Stopping."
            exit "$rc"
          done

          echo "All candidate zones exhausted due to capacity constraints."
          exit 1
