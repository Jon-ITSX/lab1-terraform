# =============================================================================
# TERRAFORM CI PIPELINE
#
# Job chain:  lint ──┐
#             security ──┼── plan ── apply (main only)
#             validate ──┘
#
# Triggers:
#   - pull_request → main : runs lint, security, validate, plan (no apply)
#   - push → main         : runs full chain including apply
#   - workflow_dispatch   : manual full-chain run (useful for re-applying)
#
# Security design:
#   - permissions: contents: read  — no write access needed
#   - concurrency lock prevents two applies running in parallel on the same ref,
#     which could corrupt state. cancel-in-progress: false ensures a running
#     apply is never interrupted mid-execution.
#   - Secrets are injected as TF_VAR_* env vars so they never appear as plain
#     CLI arguments in the runner logs.
# =============================================================================

name: Terraform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Prevent concurrent applies on the same branch/ref.
# cancel-in-progress: false protects a running apply from being interrupted.
concurrency:
  group: terraform-${{ github.ref }}
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: true
  # Terraform variables injected from GitHub Secrets.
  # TF_VAR_* prefix is the standard Terraform mechanism for env-based variables.
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_student_id: ${{ secrets.STUDENT_ID }}
  TF_VAR_region: ${{ secrets.GCP_REGION }}
  TF_VAR_zone: ${{ secrets.GCP_ZONE }}
  TF_VAR_machine_type: ${{ secrets.GCP_MACHINE_TYPE }}
  TF_VAR_gcp_sa_key_json: ${{ secrets.GCP_SA_KEY }}

jobs:
  # ---------------------------------------------------------------------------
  # LINT — enforces consistent code formatting.
  # `terraform fmt -check` exits non-zero if any file is not canonical format.
  # Keeps the codebase readable and prevents style-related review noise.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (fmt)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform fmt check
        run: terraform fmt -check -recursive

  # ---------------------------------------------------------------------------
  # SECURITY — IaC vulnerability scan with Trivy.
  # Two-pass approach:
  #   Pass 1: full report (CRITICAL/HIGH/MEDIUM/LOW) uploaded as artifact
  #           for review regardless of outcome (if: always()).
  #   Pass 2: CRITICAL-only gate with exit-code 1 to block the pipeline.
  # This means HIGH/MEDIUM/LOW findings are visible but non-blocking,
  # while CRITICAL findings stop all downstream jobs (plan, apply).
  # ---------------------------------------------------------------------------
  security:
    name: Security Scan (Trivy)
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Setup Trivy
        uses: aquasecurity/setup-trivy@v0.2.2
      - name: Generate Trivy IaC report
        run: trivy config --severity CRITICAL,HIGH,MEDIUM,LOW --format table --output trivy-report.txt .
      - name: Upload Trivy report artifact
        # Upload even on failure so the report is always available for review.
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report-${{ github.run_id }}
          path: ./trivy-report.txt
      - name: Enforce CRITICAL gate
        # exit-code 1 makes the step (and therefore the job) fail on CRITICAL findings.
        run: trivy config --severity CRITICAL --exit-code 1 .

  # ---------------------------------------------------------------------------
  # VALIDATE — checks that the Terraform configuration is syntactically correct
  # and internally consistent (variable references, resource types, etc.).
  # Uses -backend=false to skip remote state connection — no GCP auth needed.
  # ---------------------------------------------------------------------------
  validate:
    name: Validate
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - uses: hashicorp/setup-terraform@v3
      - name: Terraform init (no backend)
        run: terraform init -backend=false
      - name: Terraform validate
        run: terraform validate

  # ---------------------------------------------------------------------------
  # PLAN — shows what Terraform would change without applying anything.
  # Runs on all triggers (PR, push to main, manual) but only after all three
  # quality gates above pass. The plan artifact is uploaded for review.
  #
  # GCS fallback: if GCS_BUCKET secret is not set, plan is skipped gracefully.
  # Lint, security, and validate still provide full code quality coverage.
  # ---------------------------------------------------------------------------
  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: [lint, security, validate]
    if: github.event_name == 'pull_request' || github.event_name == 'push' || github.event_name == 'workflow_dispatch'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Set region/zone/machine fallback
        run: |
          if [ -z "$TF_VAR_region" ]; then
            echo "TF_VAR_region=europe-north1" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_zone" ]; then
            echo "TF_VAR_zone=${TF_VAR_region}-b" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_machine_type" ]; then
            echo "TF_VAR_machine_type=e2-micro" >> "$GITHUB_ENV"
          fi
      # Fail fast if mandatory secrets are missing rather than letting
      # Terraform fail later with a cryptic authentication error.
      - name: Verify required CI secrets
        run: |
          test -n "$TF_VAR_project_id" || (echo "Missing repository secret: GCP_PROJECT_ID" && exit 1)
          test -n "$TF_VAR_student_id" || (echo "Missing repository secret: STUDENT_ID" && exit 1)
          test -n "$TF_VAR_gcp_sa_key_json" || (echo "Missing repository secret: GCP_SA_KEY" && exit 1)
      # GCS fallback: if GCS_BUCKET is not set, plan is skipped gracefully.
      # Lint, security, and validate still provide full code quality coverage.
      - name: Terraform init and plan
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          if [ -n "$GCS_BUCKET" ]; then
            terraform init -backend-config="bucket=$GCS_BUCKET" -backend-config="prefix=lab1/jon-eskilsson"
            terraform plan -out=tfplan
          else
            echo "GCS_BUCKET not configured – skipping plan until remote backend is available."
            echo "Lint, security scan and validate have already verified the code."
          fi
      - name: Upload plan artifact
        if: env.GCS_BUCKET != ''
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ github.run_id }}
          path: tfplan

  # ---------------------------------------------------------------------------
  # APPLY — provisions or updates infrastructure in GCP.
  # Only runs on push to main or manual trigger (not on PRs) to prevent
  # feature branches from accidentally modifying production infrastructure.
  # Requires the production GitHub Environment for optional review gates.
  # ---------------------------------------------------------------------------
  apply:
    name: Apply
    runs-on: ubuntu-latest
    needs: [plan]
    if: github.event_name == 'workflow_dispatch' || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4
      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: hashicorp/setup-terraform@v3
      - name: Set region/zone/machine fallback
        run: |
          if [ -z "$TF_VAR_region" ]; then
            echo "TF_VAR_region=europe-north1" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_zone" ]; then
            echo "TF_VAR_zone=${TF_VAR_region}-b" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_machine_type" ]; then
            echo "TF_VAR_machine_type=e2-micro" >> "$GITHUB_ENV"
          fi
      # Fail fast if mandatory secrets are missing rather than letting
      # Terraform fail later with a cryptic authentication error.
      - name: Verify required CI secrets
        run: |
          test -n "$TF_VAR_project_id" || (echo "Missing repository secret: GCP_PROJECT_ID" && exit 1)
          test -n "$TF_VAR_student_id" || (echo "Missing repository secret: STUDENT_ID" && exit 1)
          test -n "$TF_VAR_gcp_sa_key_json" || (echo "Missing repository secret: GCP_SA_KEY" && exit 1)
      # GCS fallback: skip apply entirely if no bucket is configured.
      # Apply without remote state risks creating duplicate resources.
      - name: Terraform init
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          if [ -n "$GCS_BUCKET" ]; then
            terraform init -backend-config="bucket=$GCS_BUCKET" -backend-config="prefix=lab1/jon-eskilsson"
          else
            echo "GCS_BUCKET not configured – skipping apply until remote backend is available."
            exit 0
          fi
      - name: Terraform apply with zone fallback
        # ---------------------------------------------------------------------
        # Solution to problem 1 — GCP zone capacity limits
        # e2-micro instances sometimes fail with "does not have enough resources
        # available" in a specific zone. The shared GCP project means many
        # students compete for the same limited zone capacity.
        # SOLUTION: Try the preferred zone first, then fall back through all
        # three zones (a, b, c) in the region. Deduplication ensures the
        # preferred zone is not tried twice if it is already a/b/c.
        #----------------------------------------------------------------------
        # Solution to problem 2 — VM already exists without matching remote state
        # Without remote state (GCS_BUCKET not configured), each CI run starts
        # with an empty local state. If a VM was created in a previous run,
        # Terraform would try to create it again → duplicate resource error.
        # SOLUTION: Before every apply, check via gcloud whether the VM already
        # exists in GCP. If it does, skip the apply and exit 0 (success) so the
        # pipeline stays green. This is a temporary guardrail until remote state
        # is in place — with proper GCS state the check becomes redundant.
        # ---------------------------------------------------------------------
        if: env.GCS_BUCKET != ''
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        shell: bash
        run: |
          set -euo pipefail

          base_zone="${TF_VAR_zone:-${TF_VAR_region}-b}"
          zones=("$base_zone" "${TF_VAR_region}-a" "${TF_VAR_region}-b" "${TF_VAR_region}-c")

          declare -A seen
          ordered=()
          for z in "${zones[@]}"; do
            if [ -n "$z" ] && [ -z "${seen[$z]+x}" ]; then
              ordered+=("$z")
              seen[$z]=1
            fi
          done

          for z in "${ordered[@]}"; do
            echo "Trying apply in zone: $z"
            export TF_VAR_zone="$z"

            # Guard: if VM already exists in GCP but is absent from state,
            # skip apply to prevent a duplicate-resource error.
            if gcloud compute instances describe "${TF_VAR_student_id}-lab1-vm" --zone "$z" --project "$TF_VAR_project_id" >/dev/null 2>&1; then
              echo "VM already exists in zone $z. Skipping apply."
              exit 0
            fi

            set +e
            terraform apply -auto-approve 2>&1 | tee apply.log
            rc=${PIPESTATUS[0]}
            set -e

            if [ "$rc" -eq 0 ]; then
              echo "Apply succeeded in zone: $z"
              exit 0
            fi

            # Capacity error → retry in next zone.
            if grep -qi "does not have enough resources available" apply.log; then
              echo "Capacity issue in zone $z. Trying next zone..."
              continue
            fi

            # Resource already exists error (race condition) → treat as success.
            if grep -qi "already exists" apply.log; then
              echo "Resource already exists in zone $z without matching state. Skipping apply."
              exit 0
            fi

            echo "Apply failed for a non-capacity reason in zone $z. Stopping."
            exit "$rc"
          done

          echo "All candidate zones exhausted due to capacity constraints."
          exit 1
