# =============================================================================
# TERRAFORM DESTROY WORKFLOW
# Tears down all GCP resources managed by this Terraform configuration.
#
# Safety design:
#   - Manual trigger only (workflow_dispatch) — cannot be triggered by a push
#     or PR, so no accidental destruction is possible.
#   - Confirmation gate: the user must type "DESTROY" exactly. The job is
#     skipped entirely if the input does not match, providing a second layer
#     of protection against accidental runs.
#   - Production environment gate: requires the GitHub Environment "production"
#     which can be configured with required reviewers for extra safety.
# =============================================================================

name: Terraform Destroy

on:
  workflow_dispatch:
    inputs:
      confirm:
        # Intentional human-friction: forces the operator to type a specific
        # string rather than clicking a single button.
        description: "Type DESTROY to confirm destruction of all resources"
        required: true
        type: string

# Read-only repository access is sufficient — no code is pushed back.
permissions:
  contents: read

env:
  TF_IN_AUTOMATION: true
  TF_VAR_project_id: ${{ secrets.GCP_PROJECT_ID }}
  TF_VAR_student_id: ${{ secrets.STUDENT_ID }}
  TF_VAR_region: ${{ secrets.GCP_REGION }}
  TF_VAR_zone: ${{ secrets.GCP_ZONE }}
  TF_VAR_machine_type: ${{ secrets.GCP_MACHINE_TYPE }}
  TF_VAR_gcp_sa_key_json: ${{ secrets.GCP_SA_KEY }}

jobs:
  destroy:
    name: Destroy
    runs-on: ubuntu-latest
    # Second confirmation check — job is skipped entirely if input is wrong.
    if: github.event.inputs.confirm == 'DESTROY'
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    # Ties the job to the GitHub Environment "production", enabling optional
    # required-reviewer protection in the repository settings.
    environment:
      name: production
    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to GCP
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: hashicorp/setup-terraform@v3

      - name: Set region/zone/machine fallback
        # Mirrors the fallback logic in terraform.yml to ensure destroy uses
        # the same variable values as the original apply, avoiding zone mismatches.
        run: |
          if [ -z "$TF_VAR_region" ]; then
            echo "TF_VAR_region=europe-north1" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_zone" ]; then
            echo "TF_VAR_zone=${TF_VAR_region}-b" >> "$GITHUB_ENV"
          fi
          if [ -z "$TF_VAR_machine_type" ]; then
            echo "TF_VAR_machine_type=e2-micro" >> "$GITHUB_ENV"
          fi

      # Fail fast if mandatory secrets are missing rather than letting
      # Terraform fail later with a cryptic authentication error.
      - name: Verify required CI secrets
        run: |
          test -n "$TF_VAR_project_id"      || (echo "Missing secret: GCP_PROJECT_ID" && exit 1)
          test -n "$TF_VAR_student_id"      || (echo "Missing secret: STUDENT_ID" && exit 1)
          test -n "$TF_VAR_gcp_sa_key_json" || (echo "Missing secret: GCP_SA_KEY" && exit 1)

      # With remote state: Terraform reads the real state from GCS and knows
      # exactly which resources to destroy.
      # Without remote state: falls back to local (empty) state — destroy will
      # still run but may find nothing to delete if state is out of sync with GCP.
      - name: Terraform init
        env:
          GCS_BUCKET: ${{ secrets.GCS_BUCKET }}
        run: |
          if [ -n "$GCS_BUCKET" ]; then
            terraform init -backend-config="bucket=$GCS_BUCKET" -backend-config="prefix=lab1/jon-eskilsson"
          else
            echo "GCS_BUCKET not set – initialising without remote backend"
            terraform init -backend=false
          fi

      - name: Terraform destroy
        run: terraform destroy -auto-approve
